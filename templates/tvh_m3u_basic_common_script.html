<script type="text/javascript">
var package_name = "{{arg['package_name']}}";
var page_sub = "{{arg['page_sub']}}";
var ajax_sub = "{{arg['ajax_sub']}}";

function toggleGroupCard($card) {
  if ($card.hasClass('expanded')) {
    $card.removeClass('expanded');
    $card.find('.ff-group-toggle-mark').text('+');
  } else {
    $card.addClass('expanded');
    $card.find('.ff-group-toggle-mark').text('-');
  }
}

function escapeHtml(text) {
  return String(text || '')
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#39;');
}

function setButtonLoading($btn, loadingText) {
  if (!$btn || $btn.length === 0) return;
  if (!$btn.data('original-text')) $btn.data('original-text', $btn.html());
  $btn.prop('disabled', true);
  $btn.html('<span class="spinner-border spinner-border-sm mr-1" role="status" aria-hidden="true"></span>' + loadingText);
}

function clearButtonLoading($btn) {
  if (!$btn || $btn.length === 0) return;
  var originalText = $btn.data('original-text');
  $btn.prop('disabled', false);
  if (originalText) $btn.html(originalText);
}


function injectTopEpgTab() {
  if (!package_name) return;

  var syncPath = '/' + package_name + '/basic/sync';
  var epgPath = '/' + package_name + '/basic/epg';
  var m3uPath = '/' + package_name + '/basic/m3u';
  var apiPath = '/' + package_name + '/basic/api';

  function hasPath(href, path) {
    return String(href || '').indexOf(path) !== -1;
  }

  var $syncLink = null;
  $('a[href]').each(function(){
    var $a = $(this);
    var href = $a.attr('href') || '';
    if (!hasPath(href, syncPath)) return;

    var $container = $a.closest('ul, .nav, .nav-tabs, .nav-pills, .list-group');
    if ($container.length === 0) return;

    var hasM3u = $container.find('a[href*="' + m3uPath + '"]').length > 0;
    var hasApi = $container.find('a[href*="' + apiPath + '"]').length > 0;
    if (!hasM3u || !hasApi) return;

    $syncLink = $a;
    return false;
  });

  if (!$syncLink || $syncLink.length === 0) return;

  var $container = $syncLink.closest('ul, .nav, .nav-tabs, .nav-pills, .list-group');
  if ($container.find('a[href*="' + epgPath + '"]').length > 0) {
    if (page_sub === 'epg') {
      $container.find('.active').removeClass('active');
      $container.find('a[href*="' + epgPath + '"]').addClass('active').closest('.nav-item, li').addClass('active');
    }
    return;
  }

  var $syncItem = $syncLink.closest('.nav-item, li');
  if ($syncItem.length) {
    var $newItem = $syncItem.clone(false, false);
    $newItem.removeClass('active');
    var $newLink = $newItem.find('a').first();
    if ($newLink.length === 0) {
      $newLink = $('<a></a>');
      $newItem.empty().append($newLink);
    }
    $newLink.attr('href', epgPath).text('EPG 설정');
    $newLink.removeClass('active');
    if (page_sub === 'epg') {
      $container.find('.active').removeClass('active');
      $newItem.addClass('active');
      $newLink.addClass('active');
    }
    $syncItem.after($newItem);
    return;
  }

  var $newLinkOnly = $syncLink.clone(false, false);
  $newLinkOnly.attr('href', epgPath).text('EPG 설정').removeClass('active');
  if (page_sub === 'epg') {
    $container.find('.active').removeClass('active');
    $newLinkOnly.addClass('active');
  }
  $syncLink.after($newLinkOnly);
}

function updateEpgProviderPriorityState() {
  var $list = $('#epg_provider_priority_list');
  if ($list.length === 0) return;

  var priority = [];
  var enabledLabels = [];
  var disabledLabels = [];

  $list.find('.ff-epg-provider-row').each(function(index){
    var $row = $(this);
    var key = String($row.data('provider-key') || '').trim();
    var enabled = String($row.attr('data-enabled') || '').toLowerCase() === 'true';
    var label = $.trim($row.find('.ff-epg-provider-label').text() || key);
    if (!key) return;

    priority.push(key);
    $row.find('.epg-rank-badge').text((index + 1) + '순위');

    if (enabled) enabledLabels.push(label);
    else disabledLabels.push(label);
  });

  var enabledKeys = [];
  $list.find('.ff-epg-provider-row').each(function(){
    var $row = $(this);
    var key = String($row.data('provider-key') || '').trim();
    var enabled = String($row.attr('data-enabled') || '').toLowerCase() === 'true';
    if (enabled && key) enabledKeys.push(key);
  });

  $('#basic_epg_provider_priority').val(priority.join(','));
  $('#basic_epg_provider_enabled').val(enabledKeys.join(','));
  $('#epg_provider_enabled_preview').text(enabledLabels.length ? enabledLabels.join(' > ') : '-');
  $('#epg_provider_disabled_preview').text(disabledLabels.length ? disabledLabels.join(', ') : '-');
}

$(document).ready(function(){
  updateEpgProviderPriorityState();
});

$("body").on('click', '.epg-provider-toggle-btn', function(e){
  e.preventDefault();
  var $btn = $(this);
  var $row = $btn.closest('.ff-epg-provider-row');
  var enabled = String($row.attr('data-enabled') || '').toLowerCase() === 'true';
  enabled = !enabled;
  $row.attr('data-enabled', enabled ? 'true' : 'false');
  $btn.toggleClass('btn-primary', enabled).toggleClass('btn-outline-secondary', !enabled).text(enabled ? 'On' : 'Off');
  updateEpgProviderPriorityState();
});

$("body").on('click', '.epg-provider-up-btn', function(e){
  e.preventDefault();
  var $row = $(this).closest('.ff-epg-provider-row');
  var $prev = $row.prev('.ff-epg-provider-row');
  if ($prev.length) {
    $row.insertBefore($prev);
    updateEpgProviderPriorityState();
  }
});

$("body").on('click', '.epg-provider-down-btn', function(e){
  e.preventDefault();
  var $row = $(this).closest('.ff-epg-provider-row');
  var $next = $row.next('.ff-epg-provider-row');
  if ($next.length) {
    $row.insertAfter($next);
    updateEpgProviderPriorityState();
  }
});

function renderAdminLoginResult(ret) {
  var lines = [];
  if (ret && ret.summary) {
    lines.push('서버 정보 확인: ' + (ret.summary.serverinfo_ok ? '성공' : '실패'));
    lines.push('채널 API 접근: ' + (ret.summary.channel_api_ok ? '성공' : '실패'));
  }
  $('#admin_login_result').text(lines.join('\n'));
}

function resolveGroupPayload(selectValue, newValue) {
  var targetGroupName = (selectValue || '').trim();
  var newGroupName = (newValue || '').trim();
  return {
    group_name: newGroupName || targetGroupName,
    target_group_name: targetGroupName,
    new_group_name: newGroupName
  };
}

function runPreviewM3u($btn, loadingText) {
  if ($btn && $btn.length) setButtonLoading($btn, loadingText || '생성중');
  $.ajax({
    url: '/' + package_name + '/ajax/' + ajax_sub + '/preview_m3u',
    type: 'POST',
    cache: false,
    data: $('#setting').serialize(),
    dataType: 'json',
    success: function(ret) {
      if (ret.preview != null) {
        $('#m3u_preview').text(ret.preview);
      } else {
        $('#m3u_preview').text('preview is null');
      }
      if (ret.msg != null) notify(ret.msg, ret.ret);
    },
    error: function(xhr) {
      $('#m3u_preview').text('AJAX ERROR\n' + xhr.responseText);
      notify('미리보기 요청 실패', 'danger');
    },
    complete: function() {
      if ($btn && $btn.length) clearButtonLoading($btn);
    }
  });
}

function renderEpgStatus(ret) {
  if (!ret) return;
  $('#epg_last_fetch_time').text(ret.fetched_at || '-');
  $('#epg_channel_count').text(ret.channel_count || 0);
  $('#epg_programme_count').text(ret.programme_count || 0);
  $('#epg_icon_count').text(ret.icon_count || 0);
  $('#epg_file_size').text(ret.file_size || 0);
  $('#epg_cache_state').text(ret.cache_exists ? '있음' : '없음');

  var providerModeText = '미확인';
  if (ret.provider_mode === 'integrated') providerModeText = '통합';
  else if (ret.provider_mode === 'single') providerModeText = '단일';
  $('#epg_provider_mode').text(providerModeText);

  var providerPreview = '-';
  if (ret.provider_rows && ret.provider_rows.length) {
    providerPreview = ret.provider_rows.map(function(row){
      return String(row.label || row.key || '') + '(' + String(row.count || 0) + ')';
    }).join(', ');
  }
  $('#epg_detected_provider_preview').text(providerPreview);

  var $tbody = $('#epg_sample_tbody');
  if ($tbody.length) {
    $tbody.empty();
    var list = ret.sample_channels || [];
    if (!list.length) {
      $tbody.append('<tr><td colspan="5" class="text-muted">표시할 샘플 채널이 없습니다.</td></tr>');
    } else {
      list.forEach(function(item){
        var names = (item.display_names || []).join(' / ');
        var row = '<tr>' +
          '<td><code>' + escapeHtml(item.id || '') + '</code></td>' +
          '<td>' + escapeHtml(item.name || '') + '</td>' +
          '<td>' + escapeHtml(item.provider_label || '') + '</td>' +
          '<td>' + escapeHtml(names || '') + '</td>' +
          '<td>' + (item.icon_url ? '<a href="' + escapeHtml(item.icon_url) + '" target="_blank">있음</a>' : '-') + '</td>' +
          '</tr>';
        $tbody.append(row);
      });
    }
  }

  var lines = [];
  lines.push('캐시 상태: ' + (ret.cache_exists ? '있음' : '없음'));
  lines.push('채널 수: ' + (ret.channel_count || 0));
  lines.push('편성 수: ' + (ret.programme_count || 0));
  lines.push('로고 수: ' + (ret.icon_count || 0));
  lines.push('감지 형태: ' + providerModeText);
  if (ret.provider_rows && ret.provider_rows.length) {
    lines.push('감지 사업자: ' + ret.provider_rows.map(function(row){ return String(row.label || row.key || '') + '(' + String(row.count || 0) + ')'; }).join(', '));
  }
  if (ret.provider_mode === 'single') {
    lines.push('단일 사업자 EPG여도 현재 우선순위 설정을 유지한 채 진행 가능합니다.');
  }
  if (ret.msg) lines.push(ret.msg);
  $('#epg_result').text(lines.join('\n'));
}

$("body").on('click', '#assign_selected_btn', function(e){
  e.preventDefault();
  var $btn = $(this);
  var channelUuids = [];

  $('.ungrouped-channel-check:checked').each(function(){
    channelUuids.push($(this).val());
  });

  var payload = resolveGroupPayload(
    $('#target_group_name').val(),
    $('#new_group_name').val()
  );

  if (channelUuids.length === 0) {
    notify('채널을 먼저 선택하세요.', 'warning');
    return;
  }

  if (!payload.group_name) {
    notify('배정할 그룹을 선택하거나 새 그룹명을 입력하세요.', 'warning');
    return;
  }

  setButtonLoading($btn, '저장중');

  $.ajax({
    url: '/' + package_name + '/ajax/' + ajax_sub + '/assign_channels_to_group',
    type: 'POST',
    cache: false,
    traditional: true,
    dataType: 'json',
    data: {
      channel_uuids: channelUuids,
      target_group_name: payload.target_group_name,
      new_group_name: payload.new_group_name
    },
    success: function(ret) {
      if (ret.msg != null) notify(ret.msg, ret.ret);
      if (ret.ret === 'success') setTimeout(function(){ location.reload(); }, 400);
    },
    error: function() {
      notify('채널 그룹 지정 요청 실패', 'danger');
    },
    complete: function() {
      clearButtonLoading($btn);
    }
  });
});

function getSelectedUngroupedChannel() {
  var $checked = $('.ungrouped-channel-check:checked');
  if ($checked.length === 0) return null;
  if ($checked.length > 1) {
    notify('하나의 채널만 선택해서 진행하세요.', 'warning');
    return null;
  }
  var $label = $checked.closest('label');
  var text = $.trim($label.text());
  var uuid = $checked.val();
  var nameText = text;
  var parts = text.split('] ');
  if (parts.length > 1) nameText = parts.slice(1).join('] ');
  nameText = nameText.replace(/\s*\/\s*[^/]+$/, '').trim();
  return {channel_uuid: uuid, channel_name: nameText};
}

function renderMatchSearchResults(items) {
  var $wrap = $('#match_search_result_list');
  $wrap.empty();
  if (!items || items.length === 0) {
    $wrap.html('<div class="text-muted">검색 결과가 없습니다. 다른 채널명으로 다시 검색하세요.</div>');
    return;
  }
  items.forEach(function(item){
    var row = '' +
      '<div class="ff-search-result-item" style="display:flex; justify-content:space-between; align-items:center; gap:12px; padding:8px 6px; border-bottom:1px solid #f0f0f0;">' +
        '<div>' +
          '<div><strong>' + escapeHtml(item.standard_name || '') + '</strong></div>' +
          '<div class="text-muted" style="font-size:12px;">ID: ' + escapeHtml(item.channel_id || '') + ' / 그룹: ' + escapeHtml(item.group_name || '') + '</div>' +
        '</div>' +
        '<div><button type="button" class="btn btn-sm btn-outline-primary btn-select-master-channel" data-channel-id="' + escapeHtml(item.channel_id || '') + '" data-standard-name="' + escapeHtml(item.standard_name || '') + '" data-group-name="' + escapeHtml(item.group_name || '') + '">선택</button></div>' +
      '</div>';
    $wrap.append(row);
  });
}

        $.ajax({
          url: '/' + package_name + '/ajax/' + ajax_sub + '/apply_db_rules',

          cache: false,
          data: $('#setting').serialize(),
          dataType: 'json',

            clearButtonLoading($btn);
          }
        });

      }
    },
    error: function() {
      notify('DB에 매칭채널 추가 실패', 'danger');
      clearButtonLoading($btn);
    }
  });
});

function renderPlayLoginResult(ret) {
  var lines = [];
  if (ret && ret.summary) {
    if (ret.summary.profile_count != null) {
      lines.push('프로필 API 접근: 성공');
      lines.push('사용 가능한 프로필 수: ' + ret.summary.profile_count);
    } else if (ret.summary.profile_api_ok != null) {
      lines.push('프로필 API 접근: ' + (ret.summary.profile_api_ok ? '성공' : '실패'));
    }

    if (ret.summary.playlist_ok != null) {
      lines.push('재생목록 확인: ' + (ret.summary.playlist_ok ? '성공' : '실패'));
    } else if (ret.summary.playlist_url) {
      lines.push('재생 URL 확인: 성공');
    }

    if (ret.summary.playlist_line_count != null) {
      lines.push('재생목록 라인 수: ' + ret.summary.playlist_line_count);
    }
  }
  if (ret && ret.msg) lines.push(ret.msg);
  if (lines.length === 0) lines.push('응답은 받았지만 표시할 결과가 없습니다.');
  $('#play_login_result').text(lines.join('\n'));
}

function loadPlayProfilesAfterLogin($btn) {
  $.ajax({
    url: '/' + package_name + '/ajax/' + ajax_sub + '/load_play_profiles',
    type: 'POST',
    cache: false,
    data: $('#setting').serialize(),
    dataType: 'json',
    success: function(ret) {
      if (ret.msg != null) notify(ret.msg, ret.ret);
      var profiles = (ret && ret.profiles) ? ret.profiles : [];
      var current = $('#basic_tvh_stream_profile').val() || '';
      var html = '<option value="">선택하세요</option>';
      profiles.forEach(function(name){
        var selected = (current === name) ? ' selected' : '';
        html += '<option value="' + escapeHtml(name) + '"' + selected + '>' + escapeHtml(name) + '</option>';
      });
      $('#play_profile_select').html(html);
      if (current) $('#play_profile_select').val(current);
    },
    error: function(xhr) {
      $('#play_login_result').text('AJAX ERROR\n' + xhr.responseText);
      notify('프로필 목록 불러오기 실패', 'danger');
    },
    complete: function() {
      if ($btn && $btn.length) clearButtonLoading($btn);
    }
  });
}

  e.preventDefault();

          $('#play_login_result').text('AJAX ERROR\n' + xhr.responseText);

      clearButtonLoading($btn);
    }
  });
});
